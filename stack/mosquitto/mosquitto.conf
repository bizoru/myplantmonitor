###############################################################################
# myplantmonitor — Mosquitto config.
#
# Two listeners:
#   1883  raw MQTT, exposed publicly via the EC2 SG. Plaintext credentials.
#   9001  MQTT-over-WebSocket, NOT exposed to the host — Caddy proxies it
#         under wss://${DOMAIN}/mqtt for the browser simulator.
#
# allow_anonymous=false everywhere; clients must authenticate.
###############################################################################

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true

allow_anonymous false
password_file /mosquitto/config/passwd

# ── Listener 1: raw MQTT for sensors / sim-cli / firmware ────────────────────
listener 1883 0.0.0.0
protocol mqtt

# ── Listener 2: MQTT over WebSocket for the browser simulator ────────────────
listener 9001 0.0.0.0
protocol websockets
